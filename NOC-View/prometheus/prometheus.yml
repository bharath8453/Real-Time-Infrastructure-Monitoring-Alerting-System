global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "host_cpu"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: "net_qos"
    static_configs:
      - targets: ["host.docker.internal:9101"]

rule_files:
  - "/etc/prometheus/rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
